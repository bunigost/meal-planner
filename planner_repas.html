<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Meal Planner</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><text y=%2252%22 font-size=%2252%22>🍱</text></svg>">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <h1>Meal Planner</h1>

  <button id="editMealsBtn" class="edit-btn">Edit Meal Box</button>

  <div class="palette-box">
    <div class="palette-title">Meals</div>
    <div class="palette" id="palette"></div>
  </div>

  <div class="header">
    <div></div>
    <div onclick="renameColumn(this)">Midi</div>
    <div onclick="renameColumn(this)">Soir</div>
  </div>

  <div class="board" id="board"></div>
<div class="shopping">
  <div class="shopping-header">
    <h3>Liste de courses</h3>

    <button id="copyShop" class="copy-btn" title="Copier">
      📋
    </button>
  </div>

  <textarea id="shoppingList"></textarea>
</div>
  <div class="instructions">
    <strong>How to use</strong><br>
    Tap a meal to select it.<br>
    Tap a slot or the Meals box to place it.<br>
    Long press a card to open actions (rename / delete).<br>
    Double tap in the planner to return it to Meals.<br>
  </div>
  

  <script src="script.js"></script>

</body>
</html>
